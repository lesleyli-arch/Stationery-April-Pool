<!-- 筛选区（已精简） -->
<div class="filter-section">
    <select id="l1Filter" onchange="updateL2(); applyFilters()">
        <option value="">一级类目(全部)</option>
    </select>

    <select id="l2Filter" onchange="applyFilters()">
        <option value="">二级类目(全部)</option>
    </select>

    <select id="regionFilter" onchange="applyFilters()">
        <option value="">站点(全部)</option>
    </select>

    <select id="sortOrder" onchange="applyFilters()">
        <option value="adoDesc">单量（MTD ADO）↓</option>
        <option value="adgDesc">销售额（MTD ADG）↓</option>
        <option value="momAdoDesc">单量增长率（MoM ADO）↓</option>
        <option value="momAdgDesc">销售额增长率（MoM ADG）↓</option>
    </select>

    <span id="countDisplay" style="margin-left:auto;font-weight:bold;color:#ee4d2d;"></span>
</div>
